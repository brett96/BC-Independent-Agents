<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your HealthPlan Helper — Member App Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1d9e75; --green-d:#085041; --green-m:#0F7B5C;
  --clay:#E07856; --clay-d:#C25E3F;
  --bg:#f5faf6; --line:#d4ead9;
  --ink:#0F172A; --ink2:#334155; --mut:#64748B; --mut2:#94A3B8;
  --amber:#B45309; --amber-bg:#FEF6E7;
}
html,body{height:100%}
body{font-family:'DM Sans',ui-sans-serif,sans-serif;
  background:radial-gradient(120% 90% at 50% 0%,#eef5f0 0%,#e4ece6 55%,#dfe7e1 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:26px 16px 40px;color:var(--ink)}

/* ── Title strip ─────────────────────────────────────── */
.head{width:100%;max-width:760px;margin-bottom:18px;display:flex;align-items:center;gap:13px}
.head .mk{width:40px;height:40px;border-radius:11px;background:var(--green);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(29,158,117,.32)}
.head h1{font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.head p{font-size:12px;color:var(--mut);margin-top:2px}
.head .tag{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:999px;
  padding:6px 13px;font-size:11px;font-weight:700;color:var(--green-d);font-family:'JetBrains Mono',monospace}

/* ── Phone ───────────────────────────────────────────── */
.stage{display:flex;flex-direction:column;align-items:center}
.phone{position:relative;width:390px;height:800px;background:#0c0d0e;border-radius:52px;
  padding:13px;box-shadow:0 0 0 2px #2a2c2e,0 30px 70px rgba(0,0,0,.28),0 10px 24px rgba(0,0,0,.18)}
.phone::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);
  width:120px;height:30px;background:#0c0d0e;border-radius:0 0 18px 18px;z-index:30}
.screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:40px;
  overflow:hidden;display:flex;flex-direction:column}

/* iOS status bar */
.status{height:46px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 26px 6px;background:var(--green);color:#fff}
.status .t{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.status .sys{display:flex;gap:5px;align-items:center}

/* App bar (agent cobrand) */
.appbar{flex-shrink:0;background:var(--green);color:#fff;padding:4px 16px 12px;
  display:flex;align-items:center;gap:10px}
.brandmk{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brandtxt .b1{font-size:14px;font-weight:800;letter-spacing:-.2px;line-height:1.05}
.brandtxt .b2{font-size:9.5px;color:rgba(255,255,255,.82);margin-top:1px}
.appbar .sp{margin-left:auto;display:flex;align-items:center;gap:12px}
.iconbtn{position:relative;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.dotbadge{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;
  background:var(--clay);border:1.5px solid var(--green)}

/* Body scroll */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.body::-webkit-scrollbar{width:0}
.pad{padding:14px 14px 72px}

/* Tab bar */
.tabs{flex-shrink:0;background:#fff;border-top:1px solid var(--line);
  display:flex;padding:7px 4px 9px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  position:relative;padding:2px 0}
.tab svg{width:21px;height:21px;stroke:var(--mut2);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.tab span{font-size:9.5px;color:var(--mut2);font-weight:600}
.tab.on svg{stroke:var(--green)}
.tab.on span{color:var(--green);font-weight:700}
.tab .tbadge{position:absolute;top:-1px;right:24px;min-width:15px;height:15px;border-radius:8px;
  background:var(--clay);color:#fff;font-size:9px;font-weight:800;display:flex;
  align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #fff}

/* ── Reusable bits ───────────────────────────────────── */
.card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px}
.eyebrow{font-size:10px;font-weight:800;color:var(--green-d);letter-spacing:.6px;
  text-transform:uppercase;margin-bottom:9px}
.h-greet{font-size:20px;font-weight:800;letter-spacing:-.4px}
.h-sub{font-size:12px;color:var(--mut);margin-top:2px}
.row{display:flex;align-items:center;gap:11px}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:11px}
.btn-pri{background:var(--green);color:#fff;padding:11px 16px;font-size:13px}
.btn-pri:active{background:var(--green-d)}
.btn-ghost{background:#fff;color:var(--green-d);border:1.5px solid var(--green);
  padding:10px 16px;font-size:13px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg);
  border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:11px;
  color:var(--green-d);font-weight:600;cursor:pointer;font-family:inherit}
.pbar{background:var(--bg);border-radius:6px;height:8px;overflow:hidden}
.pfill{height:100%;border-radius:6px}
.divline{height:1px;background:var(--line);margin:12px 0}
.sectlabel{font-size:10px;font-weight:800;color:var(--mut2);letter-spacing:.7px;
  text-transform:uppercase;margin:18px 2px 9px}
.foot{padding:9px 8px 4px;text-align:center}
.foot .l1{font-size:9px;color:var(--mut2)}
.foot .l2{font-size:8.5px;color:var(--mut2);margin-top:2px}
.privacy{margin-top:16px;background:#EAF6F1;border:0.5px solid #A7D9BE;border-radius:12px;
  padding:10px 12px;display:flex;gap:9px;align-items:flex-start}
.privacy .pic{width:24px;height:24px;border-radius:7px;background:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:var(--green)}
.privacy p{font-size:10px;color:var(--green-d);line-height:1.55}
.privacy b{font-weight:800}

/* avatars */
.av{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;position:relative}
.av-ai{background:var(--green)}
.av-agent{background:linear-gradient(140deg,#E58A63,var(--clay-d))}
.verif{position:absolute;bottom:-2px;right:-2px;width:15px;height:15px;border-radius:50%;
  background:var(--green);border:2px solid #fff;display:flex;align-items:center;justify-content:center}

/* agent banner (home) */
.agentbanner{background:linear-gradient(135deg,#fff,#fbfdfb);border:1.5px solid var(--green);
  border-radius:16px;padding:13px;display:flex;align-items:center;gap:12px}

/* alert */
.alert{background:var(--amber-bg);border:1px solid #f0d9a8;border-radius:13px;padding:12px;
  display:flex;gap:10px;align-items:flex-start}
.alert .ic{width:26px;height:26px;border-radius:50%;background:#FAC775;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px}

/* ask entry */
.askbar{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);
  border-radius:14px;padding:11px 13px;cursor:pointer}
.askbar .s{font-size:12.5px;color:var(--mut);flex:1}
.askbar .go{width:30px;height:30px;border-radius:50%;background:var(--green);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

/* messages hub */
.thread{display:flex;align-items:center;gap:12px;padding:13px;background:#fff;
  border:1px solid var(--line);border-radius:15px;cursor:pointer}
.thread .meta{flex:1;min-width:0}
.thread .nm{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.thread .rl{font-size:10px;color:var(--mut);margin-top:1px}
.thread .pv{font-size:11.5px;color:var(--ink2);margin-top:4px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.thread .rt{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.thread .tm{font-size:9.5px;color:var(--mut2)}
.unread{min-width:18px;height:18px;border-radius:9px;background:var(--clay);color:#fff;
  font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* chat */
.chathead{flex-shrink:0;background:#fff;border-bottom:1px solid var(--line);
  padding:10px 12px;display:flex;align-items:center;gap:10px}
.backb{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0}
.backb svg{width:17px;height:17px;stroke:var(--ink2);fill:none;stroke-width:2.4;stroke-linecap:round}
.chathead .ttl{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.chathead .st{font-size:10px;color:var(--mut);margin-top:1px}
.aibadge{background:#E6F4EF;color:var(--green-m);font-size:8px;font-weight:800;
  padding:2px 6px;border-radius:7px;letter-spacing:.3px}
.discl{background:#EAF6F1;border:0.5px solid #A7D9BE;border-radius:11px;padding:9px 11px;
  margin-bottom:12px;display:flex;gap:8px}
.discl .ic{flex-shrink:0;margin-top:1px}
.discl p{font-size:10.5px;color:var(--green-d);line-height:1.5}
.msgs{display:flex;flex-direction:column;gap:11px}
.bubble-in{max-width:84%;align-self:flex-start;display:flex;gap:8px;align-items:flex-start}
.bubble-in .av{width:24px;height:24px;font-size:9px}
.bubble-in .bx{background:#fff;border:0.5px solid var(--line);border-radius:13px 13px 13px 4px;
  padding:9px 11px;font-size:12px;color:#1a1a2e;line-height:1.6}
.bubble-out{max-width:80%;align-self:flex-end;background:var(--green);color:#fff;
  border-radius:13px 13px 4px 13px;padding:9px 11px;font-size:12px;line-height:1.6}
.nameline{font-size:9px;color:var(--green-m);font-weight:700;margin-bottom:3px}

/* data card inside bubble */
.dcard{background:var(--bg);border:0.5px solid var(--line);border-radius:10px;padding:9px 11px;margin:7px 0}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kgrid .k{font-size:8px;color:var(--mut2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.kgrid .v{font-size:12px;font-weight:700}

/* handoff card */
.handoff{background:#fff;border:1.5px solid var(--clay);border-radius:12px;padding:11px;margin-top:7px}
.handoff .hl{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.handoff .hl .av{width:30px;height:30px;font-size:11px}
.handoff .ht{font-size:11.5px;font-weight:700;color:var(--clay-d)}
.handoff .hs{font-size:9.5px;color:var(--mut)}
.handoff p{font-size:11px;color:var(--ink2);line-height:1.55;margin-bottom:9px}

/* system note in chat */
.sysnote{align-self:center;background:#fff;border:0.5px solid var(--line);border-radius:999px;
  padding:6px 13px;font-size:10px;color:var(--mut);display:flex;align-items:center;gap:6px}

/* input bar */
.inputbar{flex-shrink:0;background:#fff;border-top:0.5px solid var(--line);padding:8px 11px}
.inputbar .f{display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--line);
  border-radius:22px;padding:8px 12px}
.inputbar .ph{flex:1;font-size:12px;color:var(--mut2)}
.inputbar .snd{width:28px;height:28px;border-radius:50%;background:var(--green);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

/* prioritized note */
.prio{background:#EAF6F1;border:0.5px solid #A7D9BE;border-radius:11px;padding:8px 11px;
  margin-bottom:12px;font-size:10.5px;color:var(--green-d);line-height:1.5;display:flex;gap:7px}

/* attachment chip */
.attach{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.2);
  border-radius:9px;padding:6px 9px;margin-top:5px;font-size:11px}

/* ID card */
.idcard{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;
  border-radius:18px;padding:16px;box-shadow:0 10px 24px rgba(8,80,65,.28)}
.idcard .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.idcard .cl{font-size:13px;font-weight:800;letter-spacing:-.2px}
.idcard .cg{display:grid;grid-template-columns:1fr 1fr;gap:11px 12px}
.idcard .lk{font-size:8.5px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.4px}
.idcard .lv{font-size:13px;font-weight:700;margin-top:2px}

/* benefit row */
.bf{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1px solid var(--line);
  border-radius:14px;padding:12px;margin-bottom:9px}
.bf .bi{width:38px;height:38px;border-radius:10px;background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px}
.bf .bmeta{flex:1}
.bf .bn{font-size:12.5px;font-weight:700}
.bf .bv{font-size:11px;color:var(--mut);margin-top:2px}
.bf .bact{margin-top:8px}

/* profile */
.prow{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:0.5px solid var(--line);cursor:pointer}
.prow:last-child{border-bottom:none}
.prow .pi{width:34px;height:34px;border-radius:10px;background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.prow .pm{flex:1}
.prow .pt{font-size:12.5px;font-weight:600}
.prow .ps{font-size:10px;color:var(--mut);margin-top:1px}
.prow .chev{color:var(--mut2);font-size:16px}
.toggle{width:42px;height:24px;border-radius:12px;position:relative;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle.off{background:#cdd6cf}
.toggle .kn{width:20px;height:20px;background:#fff;border-radius:10px;position:absolute;top:2px;
  box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.15s}
.toggle.on .kn{right:2px}
.toggle.off .kn{left:2px}

/* screen jump (review aid) */
.jump{width:100%;max-width:760px;margin-top:20px;display:flex;flex-wrap:wrap;gap:7px;
  justify-content:center}
.jump button{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;
  font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:inherit}
.jump button.on{background:var(--green);color:#fff;border-color:var(--green)}
.hint{margin-top:13px;font-size:11px;color:var(--mut);text-align:center;max-width:460px;line-height:1.5}

/* ── Content-forward home ─────────────── */
.greet2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.gsub{font-size:13.5px;color:var(--mut);margin-top:3px}
.hero{margin-top:15px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;
  border-radius:18px;padding:17px;box-shadow:0 10px 24px rgba(8,80,65,.22)}
.hero .hb{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);
  border-radius:999px;padding:5px 11px;font-size:10.5px;font-weight:800;letter-spacing:.4px;margin-bottom:10px}
.hero h2{font-size:19px;font-weight:800;line-height:1.25;letter-spacing:-.3px}
.hero p{font-size:13.5px;color:rgba(255,255,255,.92);margin-top:7px;line-height:1.5}
.hero .hbtn{margin-top:14px;background:#fff;color:var(--green-d);border:none;border-radius:12px;
  padding:12px 17px;font-size:14.5px;font-weight:800;font-family:inherit;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px}
.sect{margin-top:24px}
.sect-h{display:flex;align-items:center;gap:10px;margin:0 2px 12px}
.sect-h .si{width:32px;height:32px;border-radius:10px;background:#E6F4EF;color:var(--green-d);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sect-h .stt{font-size:16.5px;font-weight:800;letter-spacing:-.2px}
.ccard{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);
  border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer;min-height:66px}
.ccard:active{background:#fbfdfb}
.ccard .cc-ic{width:46px;height:46px;border-radius:13px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:22px}
.ccard .cc-m{flex:1;min-width:0}
.ccard .cc-t{font-size:15.5px;font-weight:700;line-height:1.25}
.ccard .cc-d{font-size:12.5px;color:var(--mut);margin-top:3px;line-height:1.4}
.ccard .cc-chev{color:var(--mut2);flex-shrink:0}
.ctag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:2px 7px;border-radius:6px;margin-bottom:5px}
.ctag.guide{background:#E6F4EF;color:var(--green-m)}
.ctag.tool{background:#EAF0FB;color:#2C5BA6}
.ctag.tip{background:var(--amber-bg);color:var(--amber)}
.ctag.list{background:#F0EAF7;color:#7A4FB0}

/* FAB */
.fab{position:absolute;right:16px;bottom:84px;z-index:25;display:inline-flex;align-items:center;gap:8px;
  background:var(--green);color:#fff;border:none;border-radius:999px;padding:13px 19px;
  font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;
  box-shadow:0 8px 22px rgba(8,80,65,.34)}
.fab:active{background:var(--green-d)}

/* guide article */
.gh{font-size:22px;font-weight:800;letter-spacing:-.3px;line-height:1.2;margin-top:6px}
.gmeta{font-size:12.5px;color:var(--mut);margin-top:7px}
.glead{font-size:15px;color:var(--ink2);line-height:1.6;margin-top:14px}
.gh3{font-size:15.5px;font-weight:800;margin:22px 0 10px}
.gp{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:10px}
.checkrow{display:flex;align-items:flex-start;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:13px;padding:13px;margin-bottom:9px}
.checkrow .cb{width:26px;height:26px;border-radius:8px;background:#E6F4EF;color:var(--green-d);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.checkrow .ct{font-size:14px;font-weight:700;line-height:1.35}
.checkrow .cs{font-size:12.5px;color:var(--mut);margin-top:3px;line-height:1.45}
.ginline{background:#EAF6F1;border:0.5px solid #A7D9BE;border-radius:14px;padding:14px;margin-top:18px}
.ginline .gt{font-size:14.5px;font-weight:800;color:var(--green-d)}
.ginline .gd{font-size:12.5px;color:var(--green-m);margin:5px 0 12px;line-height:1.45}

/* tool: search + segmented + results */
.seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px;margin-top:14px}
.seg button{flex:1;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;
  color:var(--mut);padding:10px;border-radius:9px;cursor:pointer}
.seg button.on{background:var(--green);color:#fff}
.searchf{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);
  border-radius:13px;padding:14px;margin-top:12px}
.searchf .ph{flex:1;font-size:14.5px;color:var(--mut2)}
.rescard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
.rescard .rn{font-size:15.5px;font-weight:700}
.rescard .rs{font-size:13px;color:var(--mut);margin-top:2px}
.rescard .rmeta{display:flex;align-items:center;gap:9px;margin-top:9px;flex-wrap:wrap}
.netbadge{display:inline-flex;align-items:center;gap:5px;background:#E6F4EF;color:var(--green-m);
  font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px}
.resact{display:flex;gap:9px;margin-top:12px}
.resact .rb{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer}
.rb-pri{background:var(--green);color:#fff}
.rb-ghost{background:var(--bg);color:var(--green-d);border:1px solid var(--line)}

/* Ask hero (text composer) */
.askhero{margin-top:15px;background:#fff;border:1.5px solid var(--green);border-radius:18px;
  padding:15px;box-shadow:0 6px 18px rgba(29,158,117,.14);cursor:pointer}
.askhero .ah-top{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.askhero .ah-t{font-size:17.5px;font-weight:800;letter-spacing:-.2px}
.askhero .ah-s{font-size:12px;color:var(--mut);margin-top:1px}
.askhero .ah-field{display:flex;align-items:center;gap:10px;background:var(--bg);
  border:1px solid var(--line);border-radius:13px;padding:13px 14px}
.askhero .ah-ph{flex:1;font-size:14.5px;color:var(--mut2)}
.askhero .ah-send{width:34px;height:34px;border-radius:50%;background:var(--green);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

/* Tasks: agent message highlight */
.taskmsg{display:flex;align-items:center;gap:12px;background:#FFF7F3;border:1px solid #F2C9B6;
  border-left:4px solid var(--clay);border-radius:13px;padding:13px;margin-bottom:11px;cursor:pointer}
.taskmsg .tm-m{flex:1;min-width:0}
.taskmsg .tm-n{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
.taskmsg .tm-p{font-size:12.5px;color:var(--ink2);margin-top:3px;line-height:1.4}
.newpill{background:var(--clay);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px}

/* checklist */
.clcard{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px}
.clcard.done{border-color:#A7D9BE;background:#F3FAF6}
.cl-h{display:flex;align-items:center;gap:11px}
.cl-ic{width:36px;height:36px;border-radius:10px;background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-t{font-size:15px;font-weight:800}
.cl-s{font-size:12px;color:var(--mut);margin-top:1px}
.cl-pct{font-size:15px;font-weight:800;color:var(--green);margin-left:auto}
.taskitem{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:0.5px solid var(--line);cursor:pointer}
.taskitem:first-child{border-top:none}
.tck{width:26px;height:26px;border-radius:8px;border:2px solid #cdd6cf;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff}
.tck.on{background:var(--green);border-color:var(--green)}
.tt{font-size:14px;font-weight:600;line-height:1.35}
.tt.strike{color:var(--mut2);text-decoration:line-through}
.ts{font-size:12px;color:var(--mut);margin-top:2px}

/* SMS-style composer */
.composer{flex-shrink:0;background:#fff;border-top:0.5px solid var(--line);padding:9px 11px;
  display:flex;align-items:center;gap:9px}
.composer .cm-plus{width:36px;height:36px;border-radius:50%;background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.composer .cm-field{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:11px 15px}
.composer .cm-ph{font-size:14.5px;color:var(--mut2)}
.composer .cm-send{width:36px;height:36px;border-radius:50%;background:var(--green);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div class="head">
  <div class="mk"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div>
  <div>
    <h1>Your HealthPlan Helper</h1>
    <p>White-labeled member app · cobranded to the agent · powered by BookCover</p>
  </div>
  <div class="tag">Prototype v2</div>
</div>

<div class="stage">
  <div class="phone">
    <div class="screen">
      <div class="status">
        <div class="t">9:41</div>
        <div class="sys">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4.5" y="2.5" width="3" height="8.5" rx="1"/><rect x="9" y="1" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1" opacity=".5"/></svg>
          <svg width="24" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="#fff" stroke-opacity=".6"/><rect x="2" y="2" width="17" height="8" rx="2" fill="#fff"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="#fff"/></svg>
        </div>
      </div>

      <!-- App bar: agent cobrand -->
      <div class="appbar">
        <div class="brandmk"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div>
        <div class="brandtxt">
          <div class="b1">Your HealthPlan Helper</div>
          <div class="b2">Reyes Senior Benefits</div>
        </div>
        <div class="sp">
          <div class="iconbtn" onclick="go('conv')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div class="dotbadge"></div>
          </div>
          <div class="iconbtn" onclick="go('profile')"><span style="font-size:11px;font-weight:800;color:#fff">MJ</span></div>
        </div>
      </div>

      <div class="body" id="body"></div>

      <button class="fab" id="fab" onclick="go('conv')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg> Ask</button>

      <div class="tabs" id="tabs"></div>
    </div>
  </div>

  <div class="jump" id="jump"></div>
</div>

<script>
/* ───────────── Cast & data ───────────── */
const AGENT = {name:'Sandra Reyes', agency:'Reyes Senior Benefits', initials:'SR', phone:'(510) 555-0150'};
const MEMBER = {name:'Margaret', full:'Margaret Johnson', initials:'MJ', phone:'(510) 555-0142'};
const PLAN = {name:'Gold Plus HMO', carrier:'Summit Health', id:'H1234-001', memberId:'SH-2026-08812', year:'2026'};

/* ───────────── Icon helpers ───────────── */
const I = {
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  plan:'<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="17" x2="13" y2="17"/>',
  gift:'<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>',
  chat:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>',
  phone:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1A19.5 19.5 0 0 1 5 12 19.8 19.8 0 0 1 2 3.4 2 2 0 0 1 4 1.4H7a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.4 2.1L7.9 9a16 16 0 0 0 6.3 6.3l.4-.4a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9z"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  mic:'<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>',
  spark:'<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  card:'<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>',
  pill:'<path d="M10.5 20.5a5 5 0 0 1-7-7l6-6a5 5 0 0 1 7 7z"/><line x1="8" y1="9" x2="15" y2="16"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  info:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
  chev:'<polyline points="9 18 15 12 9 6"/>',
  compass:'<circle cx="12" cy="12" r="10"/><polygon points="16.2 7.8 14.1 14.1 7.8 16.2 9.9 9.9 16.2 7.8"/>',
  dollar:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  heart:'<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>',
  pin:'<path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  back:'<polyline points="15 18 9 12 15 6"/>'
};
function svg(p,w){return `<svg width="${w||21}" height="${w||21}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}

/* ───────────── Footer ───────────── */
const FOOT = `<div class="privacy">
  <div class="pic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">${I.lock}</svg></div>
  <p><b>Your information is safe and secure.</b> We never sell or share your personal health information with outside companies — and it's removed before any AI system processes your questions.</p>
</div>`;

/* ───────────── Screens ───────────── */
const SCREENS = {};

/* HOME */
/* New-member tasks (checklist) */
const TASKS = [
  {t:'Set up your member ID card', s:'Save it to your phone for easy access'},
  {t:'Confirm your primary care doctor', s:"Make sure they're in your network"},
  {t:'Review your plan benefits', s:'Read “Understand your plan in 5 minutes”'},
  {t:'Find your pharmacy', s:'Check that it’s in-network'},
  {t:`Save ${AGENT.name.split(' ')[0]}’s contact`, s:'Your agent, one tap away'},
];
const STATE = { done:[true,false,false,false,true] };  // starts 2 of 5

SCREENS.home = ()=>{
  const done = STATE.done.filter(Boolean).length, total = STATE.done.length, allDone = done===total;
  return `<div class="pad">
  <div class="greet2">Hi ${MEMBER.name} 👋</div>

  <!-- ASK A QUESTION (top feature, text-composer style) -->
  <div class="askhero" onclick="go('conv')">
    <div class="ah-top">
      <div class="av av-agent" style="width:40px;height:40px;font-size:13px">${AGENT.initials}<div class="verif"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round">${I.check}</svg></div></div>
      <div><div class="ah-t">Ask a question</div><div class="ah-s">Your helper answers right away · ${AGENT.name.split(' ')[0]} steps in</div></div>
    </div>
    <div class="ah-field">
      <div class="ah-ph">Type your question…</div>
      <div class="ah-send"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${I.send}</svg></div>
    </div>
  </div>

  <!-- TASKS -->
  <div class="sect">
    <div class="sect-h"><div class="si"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${I.check}</svg></div><div class="stt">Tasks</div></div>

    <div class="taskmsg" onclick="go('conv')">
      <div class="av av-agent" style="width:42px;height:42px;font-size:13px">${AGENT.initials}<div class="verif"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round">${I.check}</svg></div></div>
      <div class="tm-m">
        <div class="tm-n">${AGENT.name.split(' ')[0]} sent you a message <span class="newpill">NEW</span></div>
        <div class="tm-p">Your free yearly wellness visit is a great way to start the year — want me to help you book it?</div>
      </div>
    </div>

    ${allDone ? '' : checklistCard(false)}
  </div>

  <!-- EXPLORE (simplified) -->
  ${section('Explore', I.compass, [
    {tag:'tool', icon:'🔍', bg:'#EAF0FB', t:'Find a doctor or pharmacy', d:'Search in-network care near you', go:'finder'},
    {tag:'tool', icon:'💊', bg:'#EAF0FB', t:'Look up a prescription', d:'See if a medication is covered', go:'formulary'},
    {tag:'guide', icon:'🛒', bg:'#FEF6E7', t:'Make the most of your OTC benefit', d:'What it covers and how to use it', go:'guide'},
  ])}

  ${allDone ? checklistCard(true) : ''}

  ${FOOT}
</div>`;
};

function checklistCard(collapsed){
  const done = STATE.done.filter(Boolean).length, total = STATE.done.length, pct = Math.round(done/total*100);
  if(collapsed){
    return `<div class="clcard done" style="margin-top:22px">
      <div class="cl-h">
        <div class="cl-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${I.check}</svg></div>
        <div style="flex:1"><div class="cl-t">Getting started checklist</div><div class="cl-s">All done — nice work! ${done} of ${total} complete</div></div>
      </div>
    </div>`;
  }
  const items = STATE.done.map((d,i)=>`
    <div class="taskitem" onclick="toggleTask(${i})">
      <div class="tck ${d?'on':''}">${d?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${I.check}</svg>`:''}</div>
      <div><div class="tt ${d?'strike':''}">${TASKS[i].t}</div><div class="ts">${TASKS[i].s}</div></div>
    </div>`).join('');
  return `<div class="clcard" style="margin-top:12px">
    <div class="cl-h">
      <div style="flex:1"><div class="cl-t">Getting started checklist</div><div class="cl-s">Finish these to get set up</div></div>
      <div class="cl-pct">${done}/${total}</div>
    </div>
    <div class="pbar" style="margin:11px 0 2px"><div class="pfill" style="background:var(--green);width:${pct}%"></div></div>
    <div style="margin-top:8px">${items}</div>
  </div>`;
}

/* toggle a task and re-render home in place (keep scroll position) */
function toggleTask(i){
  STATE.done[i] = !STATE.done[i];
  const body = document.getElementById('body');
  const y = body.scrollTop;
  body.innerHTML = SCREENS.home();
  body.scrollTop = y;
}

function section(title, icon, cards){
  return `<div class="sect">
    <div class="sect-h"><div class="si"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></div><div class="stt">${title}</div></div>
    ${cards.map(contentCard).join('')}
  </div>`;
}
function contentCard(c){
  const tagName={guide:'Guide',tool:'Tool',tip:'Tip',list:'Checklist'}[c.tag];
  return `<div class="ccard" onclick="go('${c.go}')">
    <div class="cc-ic" style="background:${c.bg}">${c.icon}</div>
    <div class="cc-m">
      <span class="ctag ${c.tag}">${tagName}</span>
      <div class="cc-t">${c.t}</div>
      <div class="cc-d">${c.d}</div>
    </div>
    <div class="cc-chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${I.chev}</svg></div>
  </div>`;
}

/* MY PLAN */
SCREENS.plan = ()=>`<div class="pad">
  <div class="h-greet" style="font-size:18px">My plan</div>
  <div class="h-sub">${PLAN.carrier} · updated today</div>

  <div class="card" style="margin-top:13px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
      <div>
        <div style="font-size:15px;font-weight:800">${PLAN.name}</div>
        <div style="font-size:10px;color:var(--mut)">${PLAN.carrier} · ${PLAN.year}</div>
      </div>
      <button class="btn btn-ghost" style="padding:8px 12px;font-size:11px" onclick="go('idcard')">ID card</button>
    </div>
    <div class="kgrid">
      <div><div class="k" style="font-size:8px;color:var(--mut2);text-transform:uppercase">Member ID</div><div style="font-size:12px;font-weight:700">${PLAN.memberId}</div></div>
      <div><div class="k" style="font-size:8px;color:var(--mut2);text-transform:uppercase">Plan ID</div><div style="font-size:12px;font-weight:700">${PLAN.id}</div></div>
      <div><div class="k" style="font-size:8px;color:var(--mut2);text-transform:uppercase">Effective</div><div style="font-size:12px;font-weight:700">Jan 1, ${PLAN.year}</div></div>
      <div><div class="k" style="font-size:8px;color:var(--mut2);text-transform:uppercase">Type</div><div style="font-size:12px;font-weight:700">HMO</div></div>
    </div>
  </div>

  <div class="card" style="margin-top:11px">
    <div class="eyebrow">Plan documents</div>
    ${docrow('Summary of Benefits')}
    ${docrow('Evidence of Coverage')}
    ${docrow('Drug list (formulary)')}
  </div>

  <div class="card" style="margin-top:11px">
    <div style="font-size:12px;font-weight:700;margin-bottom:3px">Questions about your plan?</div>
    <div style="font-size:11px;color:var(--mut);line-height:1.5;margin-bottom:11px">Ask the assistant any time, or message ${AGENT.name.split(' ')[0]} directly.</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-pri" style="flex:1" onclick="go('conv')">Ask the assistant</button>
      <button class="btn btn-ghost" style="flex:1" onclick="go('conv')">Message ${AGENT.name.split(' ')[0]}</button>
    </div>
  </div>
  ${FOOT}
</div>`;

function qa(icon,label,dest){return `<div class="card" style="padding:13px;cursor:pointer;display:flex;flex-direction:column;gap:8px" onclick="go('${dest}')">
  <div style="width:32px;height:32px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--green)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></div>
  <div style="font-size:12px;font-weight:700;line-height:1.2">${label}</div>
</div>`;}

function accum(label,val,pct,col,sub){return `<div style="margin-bottom:11px">
  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
    <div style="font-size:11px;color:var(--ink2);font-weight:600">${label}</div>
    <div style="font-size:11px;font-weight:700;color:${col}">${val}</div>
  </div>
  <div class="pbar"><div class="pfill" style="background:${col};width:${pct}%"></div></div>
  <div style="font-size:9px;color:var(--mut2);margin-top:4px">${sub}</div>
</div>`;}

function docrow(t){return `<div class="prow" style="padding:11px 0"><div class="pi" style="color:var(--green)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="pm"><div class="pt">${t}</div></div><div class="chev">›</div></div>`;}

/* ID CARD */
SCREENS.idcard = ()=>`<div class="pad">
  <div class="row" style="margin-bottom:14px">
    <div class="backb" onclick="go('plan')"><svg viewBox="0 0 24 24">${I.back}</svg></div>
    <div style="font-size:16px;font-weight:800">Member ID card</div>
  </div>

  <div class="idcard">
    <div class="ch">
      <div class="cl">${PLAN.carrier}</div>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">${I.shield}</svg>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px">Member</div>
    <div style="font-size:17px;font-weight:800;margin:2px 0 14px">${MEMBER.full}</div>
    <div class="cg">
      <div><div class="lk">Member ID</div><div class="lv">${PLAN.memberId}</div></div>
      <div><div class="lk">Plan</div><div class="lv">${PLAN.name}</div></div>
      <div><div class="lk">Group</div><div class="lv">GRP-4471</div></div>
      <div><div class="lk">Effective</div><div class="lv">Jan 1, ${PLAN.year}</div></div>
      <div><div class="lk">RxBIN</div><div class="lv">610502</div></div>

/* ───────────── Tab bar ───────────── */
const TABS = [
  {id:'home',label:'Home',icon:I.home},
  {id:'plan',label:'My Plan',icon:I.plan},
  {id:'conv',label:'Chat',icon:I.chat,badge:1},
  {id:'profile',label:'Profile',icon:I.user},
];
/* which tab is highlighted for a given screen */
const TABMAP = {home:'home',guide:'home',finder:'home',formulary:'home',
  plan:'plan',idcard:'plan',
  conv:'conv',
  profile:'profile'};

function renderTabs(active){
  document.getElementById('tabs').innerHTML = TABS.map(t=>{
    const on = TABMAP[active]===t.id ? 'on':'';
    const badge = t.badge ? `<div class="tbadge">${t.badge}</div>`:'';
    return `<div class="tab ${on}" onclick="go('${t.id}')">${badge}<svg viewBox="0 0 24 24">${t.icon}</svg><span>${t.label}</span></div>`;
  }).join('');
}

/* ───────────── Router ───────────── */
const CHAT_SCREENS = ['conv'];
let current='home';
function go(id){
  current=id;
  const body=document.getElementById('body');
  // chat screens render their own header + body + input; they replace the whole stack
  if(CHAT_SCREENS.includes(id)){
    // hide the shared body scroller, render full custom layout into screen
    document.querySelector('.screen').classList.add('chatmode');
    body.style.display='none';
    let host=document.getElementById('chathost');
    if(!host){host=document.createElement('div');host.id='chathost';host.style.cssText='flex:1;display:flex;flex-direction:column;min-height:0';document.querySelector('.tabs').before(host);}
    host.style.display='flex';
    host.innerHTML=SCREENS[id]();
  } else {
    const host=document.getElementById('chathost');
    if(host) host.style.display='none';
    body.style.display='block';
    body.innerHTML=SCREENS[id]();
    body.scrollTop=0;
  }
  renderTabs(id);
  renderJump(id);
  const fab=document.getElementById('fab');
  if(fab) fab.style.display = (id==='home'||id==='conv') ? 'none' : 'inline-flex';
}

/* ───────────── Review jump bar ───────────── */
const JUMP=[['home','Home'],['conv','Ask / Chat'],['guide','Guide'],['finder','Find care'],['formulary','Drug lookup'],
  ['plan','My Plan'],['idcard','ID card'],['profile','Profile']];
function renderJump(active){
  document.getElementById('jump').innerHTML=JUMP.map(([id,l])=>
    `<button class="${active===id?'on':''}" onclick="go('${id}')">${l}</button>`).join('');
}

go('home');
